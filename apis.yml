description: >-
  Dana Incorporated is a global supplier of fully integrated drivetrain and
  electrified propulsion systems for passenger, commercial, and off-highway
  vehicles. Dana announced an agreement in 2025 for its Off-Highway business
  to be acquired by Allison Transmission. Dana's main public API surface is
  the Dana Aftermarket developer platform; this repository is an alias of the
  primary "dana" profile.

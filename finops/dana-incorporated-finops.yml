specification: FinOps Framework
specificationVersion: '1.0'
schema: https://www.finops.org/framework/
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
provider: Dana Incorporated
providerId: dana-incorporated
publisherName: Dana Incorporated
serviceCategory: Automotive Aftermarket
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Aftermarket
  - Auto Parts
  - Automotive
  - Drivetrain
  - Electrified Propulsion
  - FinOps
  - FOCUS
description: 'FOCUS-aligned FinOps for Dana Incorporated aftermarket APIs: distributor API access included
  in the distributor agreement; spend tracks parts (cost-of-goods) rather than API calls.'
sources:
  - https://www.danaincorporated.com/
notes: No separate API pricing; cost tracks parts ordered via the distributor agreement.
principles:
  - name: Visibility
    description: Track parts orders, returns, and core charges via the distributor portal and Dana Aftermarket
      API order endpoints.
  - name: Allocation
    description: Tag orders by branch / shop / business unit to attribute aftermarket parts spend.
  - name: Optimization
    description: Consolidate orders to hit volume tiers; use API inventory checks before ordering to
      avoid backorder fees; manage core returns promptly.
  - name: Accountability
    description: Distributor / branch ops owns parts purchasing; finance reviews monthly distributor
      statements for chargebacks and rebate accruals.
domains:
  - name: Understand Usage and Cost
    capabilities:
      - Allocation
      - Reporting and Analytics
  - name: Quantify Business Value
    capabilities:
      - Forecasting
      - Budgeting
  - name: Optimize Usage and Cost
    capabilities:
      - Rate Optimization
  - name: Manage the FinOps Practice
    capabilities:
      - Invoicing and Chargeback
billingModel:
  pricingCategory: Cost of Goods + Distributor Agreement
  billingFrequency: Monthly
  billingCurrency: USD
  chargeCategories:
    - Purchase
    - Tax
    - Adjustment
    - Refund
  chargeFrequency: Recurring
focusColumns:
  ServiceName: Dana Incorporated
  ServiceCategory: Automotive Aftermarket
  ProviderName: Dana Incorporated
  PublisherName: Dana Incorporated
  InvoiceIssuerName: Dana Incorporated
  PricingCategory: Cost of Goods
  BillingCurrency: USD
  ChargeCategory: Purchase
meters:
  - name: parts_orders
    description: Aftermarket part orders placed via API
    unit: order
    aggregation: sum
    dimensions:
      - distributor
      - product_line
      - branch
  - name: parts_units
    description: Individual part units ordered
    unit: part
    aggregation: sum
    dimensions:
      - product_line
      - sku
  - name: api_requests
    description: API calls against the Dana Aftermarket API (not separately billed; observed for capacity)
    unit: request
    aggregation: sum
    dimensions:
      - api
      - distributor
apis:
  - name: Dana Aftermarket API
    baseURL: https://api.danaaftermarket.com
    tags:
      - Aftermarket
      - Auto Parts
      - Drivetrain
      - eCommerce
      - Supply Chain
    serviceName: Dana Aftermarket API
    serviceCategory: API
unitEconomics:
  - name: Cost per Part
    metric: billed_cost / parts_units
    target: TBD
  - name: Cost per Order
    metric: billed_cost / parts_orders
    target: TBD
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com

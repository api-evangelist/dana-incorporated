specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: Dana Incorporated
providerId: dana-incorporated
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Aftermarket
  - Auto Parts
  - Automotive
  - Drivetrain
  - Electrified Propulsion
description: Dana Incorporated is the corporate entity behind Spicer drivetrain and the Dana aftermarket
  catalog. The Dana Aftermarket API is a B2B distributor / dealer surface, not a public developer API,
  and access is provisioned through the distributor agreement. No public price list.
sources:
  - https://www.danaincorporated.com/
notes: Same B2B distributor model as the dana provider entry. No public API pricing.
plans:
  - id: dana-incorporated-distributor
    name: Authorized Distributor / Dealer
    type: enterprise
    description: B2B catalog, inventory, and order APIs available to authorized Dana distributors and
      dealers across drivetrain, aftermarket, and electrified propulsion lines.
    entries:
      - label: Distributor agreement
        description: Access provisioned per distributor contract; no separate API fee
        name: distributor_agreement
        type: subscription
        metric: contract
        limit: -1
        timeFrame: year
        geo: global
        domains:
          - https://api.danaaftermarket.com
        unit: 1
        price: included with distributor agreement
        userMultiplied: false
    elements:
      - name: Catalog & part lookup
      - name: Inventory check
      - name: Order placement
      - name: Dana Aftermarket API
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com

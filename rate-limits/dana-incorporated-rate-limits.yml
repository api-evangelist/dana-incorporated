specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: Dana Incorporated
providerId: dana-incorporated
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Aftermarket
  - Auto Parts
  - Automotive
  - Drivetrain
  - Rate Limiting
description: The Dana Aftermarket API is a B2B distributor API operated by Dana Incorporated; rate limits
  are not published publicly. Throughput is scoped per distributor account and conveyed during onboarding.
sources:
  - https://www.danaincorporated.com/
notes: No public rate-limit documentation. Limits are scoped to the distributor agreement.
responseCodes:
  throttled: 429
  serviceUnavailable: 503
limits:
  - name: Distributor account throughput
    scope: distributor
    metric: varies
    limit: per distributor agreement
    applies:
      - Dana Aftermarket API
policies:
  - name: Backoff Strategy
    description: Honor Retry-After when present; use exponential backoff with jitter on 429 / 503.
  - name: Catalog caching
    description: Cache catalog / part-master responses locally rather than polling on every order to
      stay within distributor budgets.
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
